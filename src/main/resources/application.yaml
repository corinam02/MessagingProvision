# ==============================================================================
# PROFIL: MESSAGING (Port 8082) - Folosește H2 pentru simplitate locală
# ==============================================================================
spring:
  config:
    activate:
      on-profile: messaging
  application:
    name: messaging-service
  
  # Setări Bază de Date (H2 In-Memory)
  datasource:
    url: jdbc:h2:mem:messagingdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  
  h2:
    console:
      enabled: true

  # Configurare Hibernate / JPA
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  # Configurare AWS SQS
  cloud:
    aws:
      region:
        static: us-east-1
        auto: false
      credentials:
        access-key: fake
        secret-key: fake
      sqs:
        enabled: true

aws:
  sqs:
    billing-queue-url: https://sqs.us-east-1.amazonaws.com/123456789012/MyQueue.fifo

---
# ==============================================================================
# PROFIL: BILLING (Port 8084)
# ==============================================================================
spring:
  config:
    activate:
      on-profile: billing
  application:
    name: billing-service
  datasource:
    url: jdbc:h2:mem:billingdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  cloud:
    aws:
      region:
        static: us-east-1
        auto: false
      credentials:
        access-key: fake
        secret-key: fake
      sqs:
        enabled: true

---
# ==============================================================================
# CONFIGURĂRI COMUNE (Logging)
# ==============================================================================
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [ID:%X{correlationId}] - %msg%n"